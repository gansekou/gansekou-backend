services:
  - type: web
    name: gansekou-backend
    runtime: docker
    plan: starter
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_NAME
        value: GANSEKOU
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gansekou-postgres
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: CAMPAY_BASE_URL
        value: https://demo.campay.net/api
      - key: CAMPAY_APP_ID
        sync: false
      - key: CAMPAY_TOKEN
        sync: false
      - key: CAMPAY_WEBHOOK_KEY
        sync: false

databases:
  - name: gansekou-postgres
    plan: starter
    databaseName: gansecou_db
    user: gansekou
