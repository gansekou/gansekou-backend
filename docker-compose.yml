version: "2.4"

services:
  backend:
    build:
      context: .
    image: gansekou-backend:latest
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME-GANSEKOU}
      APP_ENV: ${APP_ENV-production}
      SECRET_KEY: ${SECRET_KEY-change-this-secret}
      DATABASE_URL: postgresql://${POSTGRES_USER-postgres}:${POSTGRES_PASSWORD-postgres}@postgres:5432/${POSTGRES_DB-gansecou_db}
      CORS_ORIGINS: ${CORS_ORIGINS-http://localhost:3000,http://127.0.0.1:3000}
      UPLOAD_DIR: /app/uploads
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH-}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET-}
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      OPENAI_MODEL: ${OPENAI_MODEL-deepseek-chat}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL-https://api.deepseek.com}
      CAMPAY_BASE_URL: ${CAMPAY_BASE_URL-https://demo.campay.net/api}
      CAMPAY_APP_ID: ${CAMPAY_APP_ID-}
      CAMPAY_TOKEN: ${CAMPAY_TOKEN-}
      CAMPAY_WEBHOOK_KEY: ${CAMPAY_WEBHOOK_KEY-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-postgres}
      POSTGRES_DB: ${POSTGRES_DB-gansecou_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
